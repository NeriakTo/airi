<title>MeowVoice</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22MeowVoice%22%2C%22short_name%22%3A%22MeowVoice%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111820%22%2C%22theme_color%22%3A%22%231aafa0%22%7D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root { --bg: #111820; --surface: #1a2332; --text: #e2e8f0; --muted: #8a9ab5;
    --cyan: #1aafa0; --cyan-dim: rgba(26,175,160,0.15); --border: #2a3545;
    --red: #d94848; --green: #2ea86f; --font: system-ui, -apple-system, sans-serif; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  .top-bar { padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .dot.on { background: var(--green); }
  .top-bar .title { font-size: 0.85rem; font-weight: 600; }
  .top-bar .sub { font-size: 0.65rem; color: var(--muted); margin-left: auto; }

  .chat { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem;
    -webkit-overflow-scrolling: touch; }

  .bubble { max-width: 82%; padding: 0.55rem 0.8rem; border-radius: 14px; font-size: 0.88rem; line-height: 1.45; word-break: break-word; }
  .bubble.u { align-self: flex-end; background: var(--cyan); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.b { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.s { align-self: center; background: var(--cyan-dim); color: var(--muted); font-size: 0.75rem; border-radius: 20px; padding: 0.25rem 0.7rem; }
  .bubble .t { font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }
  .bubble.u .t { color: rgba(255,255,255,0.6); }

  .mic-area { padding: 1rem; padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }

  .phase { font-size: 0.75rem; color: var(--muted); height: 1.2rem; text-align: center; }

  .mic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--border);
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; touch-action: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mic svg { width: 36px; height: 36px; fill: var(--muted); transition: fill 0.15s; }
  .mic.hold { border-color: var(--red); background: rgba(217,72,72,0.12); transform: scale(1.12); }
  .mic.hold svg { fill: var(--red); }
  .mic.busy { border-color: var(--cyan); opacity: 0.5; pointer-events: none; }
  .mic.busy svg { fill: var(--cyan); }

  @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(217,72,72,0.3); } 100% { box-shadow: 0 0 0 20px rgba(217,72,72,0); } }
  .mic.hold { animation: ripple 1s ease-out infinite; }

  .hint { font-size: 0.7rem; color: var(--muted); }

  audio { display: none; }
</style>

<div class="top-bar">
  <span class="dot" id="dot"></span>
  <span class="title">MeowVoice</span>
  <span class="sub" id="sub"></span>
</div>

<div class="chat" id="chat"></div>

<div class="mic-area">
  <div class="phase" id="phase"></div>
  <div class="mic" id="mic">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div class="hint" id="hint">按住說話</div>
</div>

<audio id="ttsEl"></audio>
<audio id="fbEl"></audio>

<script>
var server = window.location.origin;
var dot = document.getElementById('dot');
var sub = document.getElementById('sub');
var chat = document.getElementById('chat');
var phase = document.getElementById('phase');
var mic = document.getElementById('mic');
var hint = document.getElementById('hint');
var ttsEl = document.getElementById('ttsEl');
var fbEl = document.getElementById('fbEl');
var busy = false;
var recorder = null;
var chunks = [];

function msg(role, text, meta) {
  var d = document.createElement('div');
  d.className = 'bubble ' + role;
  d.textContent = text;
  if (meta) { var m = document.createElement('div'); m.className = 't'; m.textContent = meta; d.appendChild(m); }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function setPhase(t) { phase.textContent = t || ''; }

function encodeWAV(samples, sr) {
  var buf = new ArrayBuffer(44 + samples.length * 2);
  var v = new DataView(buf);
  var w = function(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true);
  w(8,'WAVE'); w(12,'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (var i = 0; i < samples.length; i++) {
    var s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buf;
}

function playFeedback(key) { fbEl.src = server + '/voice/cached/' + key; fbEl.play().catch(function(){}); }
function stopFeedback() { fbEl.pause(); fbEl.src = ''; }

function splitSentences(text) {
  var r = [], c = '';
  for (var i = 0; i < text.length; i++) {
    c += text[i];
    if ('。！？!?\n'.indexOf(text[i]) >= 0) { if (c.trim()) r.push(c.trim()); c = ''; }
  }
  if (c.trim()) r.push(c.trim());
  if (r.length === 0 && text.trim()) r.push(text.trim());
  return r;
}

async function playTts(text) {
  var res = await fetch(server + '/v1/audio/speech', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ input: text, voice: 'Chelsie', model: 'qwen3-tts' }),
  });
  var blob = await res.blob();
  var url = URL.createObjectURL(blob);
  ttsEl.src = url;
  await ttsEl.play();
  await new Promise(function(r) { ttsEl.onended = r; });
  URL.revokeObjectURL(url);
}

// --- Press-and-hold recording ---
function startRec() {
  if (busy) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      process(new Blob(chunks, { type: recorder.mimeType }));
    };
    recorder.start();
    mic.classList.add('hold');
    hint.textContent = '放開送出';
    setPhase('錄音中…');
  }).catch(function() { msg('s', '麥克風存取失敗'); });
}

function stopRec() {
  if (recorder && recorder.state === 'recording') {
    recorder.stop();
    mic.classList.remove('hold');
  }
}

async function process(blob) {
  busy = true;
  mic.classList.add('busy');
  hint.textContent = '';

  var wavBlob = blob;
  var ext = blob.type.includes('mp4') ? 'mp4' : blob.type.includes('webm') ? 'webm' : 'wav';
  if (typeof AudioContext !== 'undefined') {
    var ctx = null;
    try {
      ctx = new AudioContext();
      var decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
      var pcm = decoded.getChannelData(0);
      wavBlob = new Blob([encodeWAV(pcm, decoded.sampleRate)], { type: 'audio/wav' });
      ext = 'wav';
    } catch (e) {} finally { if (ctx) ctx.close(); }
  }

  // STT
  setPhase('辨識中…');
  var form = new FormData();
  form.append('file', wavBlob, 'v.' + ext);
  try {
    var sttRes = await fetch(server + '/v1/audio/transcriptions?model=breeze-asr-25&language=zh', { method: 'POST', body: form });
    var sttData = await sttRes.json();
    if (!sttData.text || !sttData.text.trim()) { msg('s', '沒聽到'); done(); return; }
    msg('u', sttData.text);
  } catch (e) { msg('s', 'STT 失敗'); done(); return; }

  // Dispatch with feedback
  setPhase('青喵思考中…');
  playFeedback('ack');
  var hbTimer = setTimeout(function() { playFeedback('heartbeat'); }, 15000);
  var toTimer = setTimeout(function() { playFeedback('timeout'); }, 60000);
  var t0 = Date.now();

  try {
    var dRes = await fetch(server + '/voice/dispatch', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: sttData.text }),
    });
    var dData = await dRes.json();
    clearTimeout(hbTimer); clearTimeout(toTimer); stopFeedback();
    var elapsed = ((Date.now() - t0) / 1000).toFixed(1);

    if (dData.timeout || !dData.text) { msg('s', '未在時限內回覆 (' + elapsed + 's)'); done(); return; }
    msg('b', dData.text, elapsed + 's');

    // Sentence TTS
    var sentences = splitSentences(dData.text);
    for (var i = 0; i < sentences.length; i++) {
      setPhase('播放 ' + (i + 1) + '/' + sentences.length);
      try { await playTts(sentences[i]); } catch (e) {}
    }
  } catch (e) {
    clearTimeout(hbTimer); clearTimeout(toTimer); stopFeedback();
    msg('s', '連線失敗');
  }
  done();
}

function done() {
  busy = false;
  mic.classList.remove('busy');
  hint.textContent = '按住說話';
  setPhase('');
}

// Touch events (press and hold)
mic.addEventListener('touchstart', function(e) { e.preventDefault(); startRec(); }, { passive: false });
mic.addEventListener('touchend', function(e) { e.preventDefault(); stopRec(); });
mic.addEventListener('touchcancel', function(e) { stopRec(); });
// Mouse fallback
mic.addEventListener('mousedown', function(e) { e.preventDefault(); startRec(); });
mic.addEventListener('mouseup', function(e) { stopRec(); });
mic.addEventListener('mouseleave', function(e) { stopRec(); });

// Health check
fetch(server + '/health').then(function(r) { return r.json(); }).then(function(d) {
  dot.classList.add('on');
  sub.textContent = d.stt_model.split('/').pop();
}).catch(function() { sub.textContent = '離線'; });

msg('s', '按住麥克風開始對話');
</script>
