<title>MeowVoice</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22MeowVoice%22%2C%22short_name%22%3A%22MeowVoice%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111820%22%2C%22theme_color%22%3A%22%231aafa0%22%7D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root { --bg: #111820; --surface: #1a2332; --text: #e2e8f0; --muted: #8a9ab5;
    --cyan: #1aafa0; --cyan-dim: rgba(26,175,160,0.15); --border: #2a3545;
    --red: #d94848; --green: #2ea86f; --font: system-ui, -apple-system, sans-serif; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  .top-bar { padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .dot.on { background: var(--green); }
  .top-bar .title { font-size: 0.85rem; font-weight: 600; }
  .top-bar .sub { font-size: 0.65rem; color: var(--muted); margin-left: auto; }

  .chat { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem;
    -webkit-overflow-scrolling: touch; }

  .bubble { max-width: 82%; padding: 0.55rem 0.8rem; border-radius: 14px; font-size: 0.88rem; line-height: 1.45; word-break: break-word; }
  .bubble.u { align-self: flex-end; background: var(--cyan); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.b { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.s { align-self: center; background: var(--cyan-dim); color: var(--muted); font-size: 0.75rem; border-radius: 20px; padding: 0.25rem 0.7rem; }
  .bubble .t { font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }
  .bubble.u .t { color: rgba(255,255,255,0.6); }

  .mic-area { position: relative; padding: 1rem; padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }

  .phase { font-size: 0.75rem; color: var(--muted); height: 1.2rem; text-align: center; }

  .mic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--border);
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; touch-action: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mic svg { width: 36px; height: 36px; fill: var(--muted); transition: fill 0.15s; }
  .mic.hold { border-color: var(--red); background: rgba(217,72,72,0.12); transform: scale(1.12); }
  .mic.hold svg { fill: var(--red); }
  .mic.busy { border-color: var(--cyan); opacity: 0.5; pointer-events: none; }
  .mic.busy svg { fill: var(--cyan); }
  .mic.locked { border-color: var(--muted); opacity: 0.3; pointer-events: none; }

  @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(217,72,72,0.3); } 100% { box-shadow: 0 0 0 20px rgba(217,72,72,0); } }
  .mic.hold { animation: ripple 1s ease-out infinite; }
  .mic.cancel { border-color: var(--muted); background: rgba(138,154,181,0.12); transform: scale(0.92);
    animation: none; box-shadow: none; }
  .mic.cancel svg { fill: var(--muted); }

  .cancel-hint { position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    background: rgba(217,72,72,0.9); color: #fff; font-size: 0.78rem; padding: 0.35rem 0.9rem;
    border-radius: 20px; white-space: nowrap; opacity: 0; transition: opacity 0.15s;
    pointer-events: none; }
  .cancel-hint.show { opacity: 1; }

  .hint { font-size: 0.7rem; color: var(--muted); }

  audio { display: none; }

  .pin-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .pin-box { text-align: center; }
  .pin-box h2 { font-size: 1.1rem; margin-bottom: 1rem; }
  .pin-box input { font-family: var(--font); font-size: 1.5rem; width: 180px; text-align: center;
    padding: 0.6rem; border: 2px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); letter-spacing: 0.3em;
    -webkit-user-select: text; user-select: text; }
  .pin-box input:focus { outline: none; border-color: var(--cyan); }
  .pin-box .pin-err { color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }
  .pin-box .pin-hint { color: var(--muted); font-size: 0.7rem; margin-top: 0.3rem; }
</style>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <h2>MeowVoice</h2>
    <input type="tel" id="pinInput" maxlength="6" placeholder="PIN" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-hint">6 碼數字驗證</div>
  </div>
</div>

<div class="top-bar">
  <span class="dot" id="dot"></span>
  <span class="title">MeowVoice</span>
  <span class="sub" id="sub"></span>
</div>

<div class="chat" id="chat"></div>

<div class="mic-area">
  <div class="phase" id="phase"></div>
  <div class="cancel-hint" id="cancelHint">↑ 放開取消錄音</div>
  <div class="mic locked" id="mic">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div class="hint" id="hint">輸入 PIN 以啟用</div>
</div>

<audio id="ttsEl"></audio>
<audio id="fbEl"></audio>

<script>
var server = window.location.origin;
var pin = sessionStorage.getItem('meowvoice_pin') || '';
var hasSession = false;
var dot = document.getElementById('dot');
var sub = document.getElementById('sub');
var chat = document.getElementById('chat');
var phase = document.getElementById('phase');
var mic = document.getElementById('mic');
var hint = document.getElementById('hint');
var ttsEl = document.getElementById('ttsEl');
var fbEl = document.getElementById('fbEl');
var pinOverlay = document.getElementById('pinOverlay');
var pinInput = document.getElementById('pinInput');
var pinErr = document.getElementById('pinErr');
var cancelHint = document.getElementById('cancelHint');
var busy = false;
var busySince = 0;
var recorder = null;
var micStream = null;
var chunks = [];
var touchStartY = 0;
var cancelThreshold = 80;
var isCancelled = false;
var dispatchAbort = null;

function pinHeaders() {
  if (hasSession) return {};
  return { 'X-Voice-Pin': pin };
}

function msg(role, text, meta) {
  var d = document.createElement('div');
  d.className = 'bubble ' + role;
  d.textContent = text;
  if (meta) { var m = document.createElement('div'); m.className = 't'; m.textContent = meta; d.appendChild(m); }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function setPhase(t) { phase.textContent = t || ''; }

function encodeWAV(samples, sr) {
  var buf = new ArrayBuffer(44 + samples.length * 2);
  var v = new DataView(buf);
  var w = function(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true);
  w(8,'WAVE'); w(12,'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (var i = 0; i < samples.length; i++) {
    var s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buf;
}

function playFeedback(key) { fbEl.src = server + '/voice/cached/' + key; fbEl.play().catch(function(){}); }
function stopFeedback() { fbEl.pause(); fbEl.src = ''; }

// --- PIN validation ---
function checkStoredPin() {
  if (pin && pin.length === 6) {
    fetch(server + '/voice/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pin }),
      credentials: 'include',
    }).then(function(r) {
      if (r.ok) {
        hasSession = true;
        unlockMic();
        initMic();
      } else {
        showPinScreen();
      }
    }).catch(function() {
      showPinScreen();
    });
  } else {
    showPinScreen();
  }
}

function showPinScreen() {
  pinOverlay.style.display = 'flex';
  pinInput.value = '';
  pinInput.focus();
}

function unlockMic() {
  pinOverlay.style.display = 'none';
  mic.classList.remove('locked');
  hint.textContent = '按住說話';
}

pinInput.addEventListener('input', function() {
  pinErr.textContent = '';
  if (pinInput.value.length === 6) {
    pin = pinInput.value;
    fetch(server + '/voice/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pin }),
      credentials: 'include',
    }).then(function(r) {
      if (r.status === 401) {
        pinErr.textContent = 'PIN 錯誤';
        pin = '';
      } else if (r.status === 429) {
        pinErr.textContent = '嘗試次數過多，請稍後再試';
        pin = '';
      } else if (r.ok) {
        hasSession = true;
        sessionStorage.setItem('meowvoice_pin', pin);
        unlockMic();
        initMic();
        msg('s', '驗證成功，按住麥克風說話');
      } else {
        pinErr.textContent = '連線失敗';
        pin = '';
      }
    }).catch(function() {
      pinErr.textContent = '連線失敗';
      pin = '';
    });
  }
});

// --- Mic stream management (request permission once, keep stream alive) ---
function initMic() {
  if (micStream) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    micStream = stream;
  }).catch(function() {});
}

// iOS 在 TTS 播放或頁面切到背景後，會靜默停掉快取的麥克風 track——
// stream.active 仍是 true，但錄出來的是缺 EBML 檔頭的壞檔。
// 錄音前必須驗 track 本身的健康度，不健康就整個重新取得。
function micHealthy() {
  if (!micStream || !micStream.active) return false;
  var t = micStream.getAudioTracks()[0];
  return !!t && t.readyState === 'live' && !t.muted;
}

function resetMic() {
  if (micStream) {
    try { micStream.getTracks().forEach(function(t) { t.stop(); }); } catch (e) {}
  }
  micStream = null;
}

// --- Press-and-hold recording ---
function unlockTtsEl() {
  // Mobile browsers require audio elements to be "blessed" by a user gesture.
  // Play a minimal silent WAV to unlock ttsEl for later programmatic playback.
  ttsEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  ttsEl.play().then(function() { ttsEl.pause(); ttsEl.src = ''; }).catch(function() {});
}

function startRec() {
  if (busy || !pin) return;
  unlockTtsEl();
  function beginRecording(stream) {
    var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = function() {
      if (isCancelled) {
        isCancelled = false;
        msg('s', '已取消錄音');
        done();
        return;
      }
      process(new Blob(chunks, { type: recorder.mimeType }));
    };
    recorder.start();
    mic.classList.add('hold');
    hint.textContent = '放開送出';
    setPhase('錄音中…');
  }
  if (micHealthy()) {
    beginRecording(micStream);
  } else {
    resetMic();
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      micStream = stream;
      beginRecording(stream);
    }).catch(function() { msg('s', '麥克風存取失敗'); });
  }
}

function stopRec() {
  if (recorder && recorder.state === 'recording') {
    recorder.stop();
    mic.classList.remove('hold');
    mic.classList.remove('cancel');
    cancelHint.classList.remove('show');
  }
}

function onTouchMove(e) {
  if (!recorder || recorder.state !== 'recording') return;
  var dy = touchStartY - e.touches[0].clientY;
  if (dy > cancelThreshold) {
    if (!mic.classList.contains('cancel')) {
      mic.classList.remove('hold');
      mic.classList.add('cancel');
      cancelHint.classList.add('show');
      hint.textContent = '放開取消';
      setPhase('');
      isCancelled = true;
    }
  } else {
    if (mic.classList.contains('cancel')) {
      mic.classList.remove('cancel');
      mic.classList.add('hold');
      cancelHint.classList.remove('show');
      hint.textContent = '放開送出';
      setPhase('錄音中…');
      isCancelled = false;
    }
  }
}

async function sttRequest(wavBlob, ext) {
  var form = new FormData();
  form.append('file', wavBlob, 'v.' + ext);
  var res = await fetch(server + '/v1/audio/transcriptions?model=breeze-asr-25&language=zh', {
    method: 'POST', body: form, headers: pinHeaders(), credentials: 'include',
  });
  return res;
}

async function process(blob) {
  busy = true;
  busySince = Date.now();
  mic.classList.add('busy');
  hint.textContent = '';

  // 麥克風 track 失效時 MediaRecorder 會產出近乎空白的 blob——攔在上傳前，
  // 並丟棄快取 stream，讓下一次按住時重新取得健康的麥克風
  if (blob.size < 1024) {
    resetMic();
    msg('s', '錄音沒有內容（麥克風可能被系統暫停），請再按住說一次');
    done();
    return;
  }

  var wavBlob = blob;
  var ext = blob.type.includes('mp4') ? 'mp4' : blob.type.includes('webm') ? 'webm' : 'wav';
  var duration = 0;
  if (typeof AudioContext !== 'undefined') {
    var ctx = null;
    try {
      ctx = new AudioContext();
      var decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
      duration = decoded.duration;
      var pcm = decoded.getChannelData(0);
      wavBlob = new Blob([encodeWAV(pcm, decoded.sampleRate)], { type: 'audio/wav' });
      ext = 'wav';
    } catch (e) {} finally { if (ctx) ctx.close(); }
  }

  if (duration > 0 && duration < 0.5) { msg('s', '錄音太短'); done(); return; }

  // STT with retry
  setPhase('辨識中…');
  var sttData = null;
  for (var attempt = 0; attempt < 2; attempt++) {
    try {
      var sttRes = await sttRequest(wavBlob, ext);
      if (sttRes.status === 401) { msg('s', 'PIN 驗證失敗'); showPinScreen(); done(); return; }
      // 400＝音檔本身壞掉（麥克風 track 失效），重試同一個檔必敗——
      // 直接重置麥克風請使用者重錄
      if (sttRes.status === 400) {
        resetMic();
        msg('s', '錄音檔無法辨識（麥克風可能被系統暫停），請再按住說一次');
        done();
        return;
      }
      sttData = await sttRes.json();
      if (sttData.text && sttData.text.trim()) break;
      sttData = null;
    } catch (e) {
      sttData = null;
      if (attempt === 0) {
        setPhase('重試辨識…');
        await new Promise(function(r) { setTimeout(r, 1500); });
      }
    }
  }
  if (!sttData || !sttData.text || !sttData.text.trim()) { msg('s', attempt > 0 ? 'STT 失敗（已重試）' : '沒聽到'); done(); return; }
  msg('u', sttData.text);

  // Inject to Claude Code session via voice plugin
  setPhase('送出指令…');
  playFeedback('ack');

  // 每句語音一個唯一識別碼——iOS 喚醒後若網路層重放同一個 POST，
  // 伺服器據此去重，同一句話絕不注入兩次
  var clientMsgId = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now() + '-' + Math.random().toString(16).slice(2);
  try {
    dispatchAbort = new AbortController();
    var dRes = await fetch(server + '/voice/dispatch', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, pinHeaders()),
      body: JSON.stringify({ text: sttData.text, client_msg_id: clientMsgId }),
      credentials: 'include',
      signal: dispatchAbort.signal,
    });
    dispatchAbort = null;
    if (dRes.status === 401) { msg('s', 'PIN 驗證失敗'); stopFeedback(); showPinScreen(); done(); return; }
    var dData = await dRes.json();

    if (dData.duplicate) { msg('s', '此指令剛已送出過，略過重發'); stopFeedback(); done(); return; }

    if (dData.injected) {
      msg('s', '已送達青喵');
      stopFeedback();
      await pollReply(dData.message_id);
    } else {
      stopFeedback();
      msg('s', '送出失敗: ' + (dData.error || '未知錯誤'));
    }
  } catch (e) {
    dispatchAbort = null;
    stopFeedback();
    msg('s', e && e.name === 'AbortError' ? '頁面切換，指令已中止，請重新說一次' : '連線失敗');
  }
  done();
}

// iOS 鎖屏會凍結頁面並回收連線；喚醒後 Safari 可能重放尚未收到回應的 POST
// （2026-07-17 實案：同一句語音間隔 17 分鐘注入兩次）。頁面隱藏時主動中止
// in-flight dispatch，讓網路層沒有可重放的請求；伺服器端另有 client_msg_id
// 去重兜底。
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') {
    if (dispatchAbort) {
      try { dispatchAbort.abort(); } catch (e) {}
      dispatchAbort = null;
    }
  } else if (busy && busySince && Date.now() - busySince > 180000) {
    // 喚醒後 busy 卡超過 3 分鐘＝流程死在鎖屏期間，重置 UI 與麥克風
    resetMic();
    done();
    msg('s', '已重置（鎖屏中斷了上一個流程），請重新按住說話');
  }
});

async function pollReply(messageId) {
  setPhase('等待回覆…');
  for (var i = 0; i < 60; i++) {
    await new Promise(function(r) { setTimeout(r, 2000); });
    try {
      var res = await fetch(server + '/voice/reply/' + messageId, { headers: pinHeaders(), credentials: 'include' });
      var data = await res.json();
      if (data.status === 'ready') {
        msg('b', data.text);
        setPhase('語音合成中…');
        try {
          var ttsRes = await fetch(server + '/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: data.text }),
          });
          if (ttsRes.ok) {
            var audioBlob = await ttsRes.blob();
            ttsEl.src = URL.createObjectURL(audioBlob);
            ttsEl.play().catch(function(e){ console.error('TTS play blocked:', e); });
          }
        } catch (e) {}
        setPhase('');
        return;
      }
    } catch (e) {}
  }
  msg('s', '回覆超時（2 分鐘）');
  setPhase('');
}

function done() {
  busy = false;
  busySince = 0;
  mic.classList.remove('busy');
  hint.textContent = '按住說話';
  setPhase('');
}

// Touch events (press and hold with swipe-up cancel)
mic.addEventListener('touchstart', function(e) { e.preventDefault(); touchStartY = e.touches[0].clientY; isCancelled = false; startRec(); }, { passive: false });
mic.addEventListener('touchmove', function(e) { e.preventDefault(); onTouchMove(e); }, { passive: false });
mic.addEventListener('touchend', function(e) { e.preventDefault(); stopRec(); });
mic.addEventListener('touchcancel', function(e) { isCancelled = true; stopRec(); });
// Mouse fallback
mic.addEventListener('mousedown', function(e) { e.preventDefault(); startRec(); });
mic.addEventListener('mouseup', function(e) { stopRec(); });
mic.addEventListener('mouseleave', function(e) { stopRec(); });

// Health check
fetch(server + '/health').then(function(r) { return r.json(); }).then(function(d) {
  dot.classList.add('on');
  sub.textContent = d.stt_model.split('/').pop();
}).catch(function() { sub.textContent = '離線'; });

// Init
checkStoredPin();
</script>
