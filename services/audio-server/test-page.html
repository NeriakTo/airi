<title>MeowVoice 語音對話</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22MeowVoice%22%2C%22short_name%22%3A%22MeowVoice%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111820%22%2C%22theme_color%22%3A%22%231aafa0%22%7D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    --bg: #f6f8fa; --surface: #ffffff; --text: #1a2332; --text-muted: #5a6a7e;
    --cyan: #1aafa0; --cyan-soft: #d5f0ed; --cyan-glow: rgba(26,175,160,0.12);
    --border: #dfe4ea; --red: #d94848; --green: #2ea86f;
    --radius: 10px;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111820; --surface: #1a2332; --text: #e2e8f0; --text-muted: #8a9ab5;
      --cyan-soft: rgba(26,175,160,0.15); --cyan-glow: rgba(26,175,160,0.08); --border: #2a3545; }
  }
  :root[data-theme="dark"] { --bg: #111820; --surface: #1a2332; --text: #e2e8f0; --text-muted: #8a9ab5;
    --cyan-soft: rgba(26,175,160,0.15); --cyan-glow: rgba(26,175,160,0.08); --border: #2a3545; }
  :root[data-theme="light"] { --bg: #f6f8fa; --surface: #ffffff; --text: #1a2332; --text-muted: #5a6a7e;
    --cyan-soft: #d5f0ed; --cyan-glow: rgba(26,175,160,0.12); --border: #dfe4ea; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  .header { padding: 1rem; text-align: center; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; transition: background 0.3s; }
  .dot.online { background: var(--green); }
  .status-text { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); margin-top: 0.25rem; }

  .chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

  .msg { max-width: 85%; padding: 0.65rem 0.9rem; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--cyan); color: #fff; border-bottom-right-radius: 3px; }
  .msg.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.system { align-self: center; background: var(--cyan-glow); color: var(--text-muted); font-size: 0.78rem; border-radius: 20px; padding: 0.3rem 0.8rem; }
  .msg .meta { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.3rem; font-family: var(--mono); }
  .msg.user .meta { color: rgba(255,255,255,0.7); }

  .controls { padding: 0.75rem 1rem; border-top: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: center; gap: 0.75rem; padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }

  .mic-btn { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--border);
    background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; }
  .mic-btn:hover { border-color: var(--cyan); }
  .mic-btn.recording { border-color: var(--red); background: rgba(217,72,72,0.08); animation: pulse 1.5s ease-in-out infinite; }
  .mic-btn.processing { border-color: var(--cyan); opacity: 0.6; pointer-events: none; }
  .mic-btn svg { width: 24px; height: 24px; fill: var(--text-muted); transition: fill 0.2s; }
  .mic-btn:hover svg { fill: var(--cyan); }
  .mic-btn.recording svg { fill: var(--red); }

  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(217,72,72,0.25); } 50% { box-shadow: 0 0 0 10px rgba(217,72,72,0); } }

  .controls-info { flex: 1; font-size: 0.78rem; color: var(--text-muted); }
  .controls-info .phase { font-weight: 500; color: var(--text); }

  .config-toggle { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; padding: 0.3rem; }
  .config-panel { padding: 0.75rem 1rem; border-top: 1px solid var(--border); background: var(--surface); display: none; }
  .config-panel.open { display: block; }
  .config-panel label { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .config-panel input { font-family: var(--mono); font-size: 0.8rem; padding: 0.4rem 0.5rem; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text); outline: none; width: 100%; margin-top: 0.2rem; margin-bottom: 0.5rem; }
  .config-panel input:focus { border-color: var(--cyan); }

  audio { display: none; }
</style>

<div class="header">
  <h1><span class="dot" id="dot"></span> MeowVoice</h1>
  <div class="status-text" id="statusText">connecting...</div>
</div>

<div class="chat" id="chat"></div>

<div class="config-panel" id="configPanel">
  <label>Server URL</label>
  <input id="serverUrl" value="" placeholder="留空 = 同 origin" spellcheck="false">
</div>

<div class="controls">
  <button class="mic-btn" id="micBtn" onclick="toggleVoice()">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <div class="controls-info">
    <div class="phase" id="phaseText">點擊開始對話</div>
    <div id="phaseDetail"></div>
  </div>
  <span class="config-toggle" onclick="document.getElementById('configPanel').classList.toggle('open')">&#9881;</span>
</div>

<audio id="ttsAudio"></audio>

<script>
const $ = id => document.getElementById(id);
const dot = $('dot');
const statusText = $('statusText');
const micBtn = $('micBtn');
const phaseText = $('phaseText');
const phaseDetail = $('phaseDetail');
const chatEl = $('chat');
const ttsAudio = $('ttsAudio');

let mediaRecorder = null;
let chunks = [];
let busy = false;

function getServer() { return $('serverUrl').value.trim().replace(/\/+$/, '') || window.location.origin; }

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function setPhase(phase, detail) {
  phaseText.textContent = phase;
  phaseDetail.textContent = detail || '';
}

async function checkHealth() {
  try {
    const res = await fetch(getServer() + '/health');
    const data = await res.json();
    dot.classList.add('online');
    statusText.textContent = data.tts_model.split('/').pop() + ' · ' + data.stt_model.split('/').pop();
  } catch (e) {
    dot.classList.remove('online');
    statusText.textContent = '無法連線';
  }
}

function encodeWAV(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true);
  w(8,'WAVE'); w(12,'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buf;
}

async function toggleVoice() {
  if (busy) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    mediaRecorder = mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream);
    const recMime = mediaRecorder.mimeType;
    chunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      micBtn.classList.remove('recording');
      micBtn.classList.add('processing');
      busy = true;
      stream.getTracks().forEach(t => t.stop());

      try {
        await processVoice(new Blob(chunks, { type: recMime }));
      } catch (e) {
        addMsg('system', '錯誤: ' + e.message);
      } finally {
        busy = false;
        micBtn.classList.remove('processing');
        setPhase('點擊繼續對話', '');
      }
    };

    mediaRecorder.start();
    micBtn.classList.add('recording');
    setPhase('錄音中…', '再點一下停止');
  } catch (e) {
    addMsg('system', '麥克風存取失敗: ' + e.message);
  }
}

async function processVoice(audioBlob) {
  var wavBlob = audioBlob;
  var ext = audioBlob.type.includes('mp4') ? 'mp4' : audioBlob.type.includes('webm') ? 'webm' : 'wav';

  // Try client-side WAV conversion; if it fails (iOS Safari), send raw blob
  if (typeof AudioContext !== 'undefined') {
    try {
      setPhase('轉換音訊…', '');
      var arrayBuf = await audioBlob.arrayBuffer();
      var audioCtx = new AudioContext();
      var decoded = await audioCtx.decodeAudioData(arrayBuf);
      var pcm = decoded.getChannelData(0);
      var wavBuf = encodeWAV(pcm, decoded.sampleRate);
      wavBlob = new Blob([wavBuf], { type: 'audio/wav' });
      ext = 'wav';
      audioCtx.close();
    } catch (e) {
      console.warn('Client-side WAV conversion failed, sending raw audio:', e);
      wavBlob = audioBlob;
    }
  }

  setPhase('語音辨識中…', (wavBlob.size / 1024).toFixed(0) + ' KB');
  var sttForm = new FormData();
  sttForm.append('file', wavBlob, 'voice.' + ext);
  var sttRes = await fetch(getServer() + '/v1/audio/transcriptions?model=breeze-asr-25&language=zh', {
    method: 'POST', body: sttForm
  });
  if (!sttRes.ok) throw new Error('STT 失敗: ' + sttRes.status);
  var sttData = await sttRes.json();
  const userText = sttData.text;
  if (!userText || !userText.trim()) {
    addMsg('system', '未偵測到語音');
    return;
  }
  addMsg('user', userText);

  setPhase('傳送給青喵…', '等待回覆中（約 10-30 秒）');
  const t0 = Date.now();
  var dispatchRes, dispatchData;
  try {
    var ctrl = new AbortController();
    var tid = setTimeout(function() { ctrl.abort(); }, 120000);
    dispatchRes = await fetch(getServer() + '/voice/dispatch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: userText }),
      signal: ctrl.signal,
    });
    clearTimeout(tid);
    dispatchData = await dispatchRes.json();
  } catch (fetchErr) {
    addMsg('system', '連線中斷，請重試（' + fetchErr.message + '）');
    return;
  }
  const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

  if (dispatchData.timeout || !dispatchData.text) {
    addMsg('system', '青喵未在時限內回覆 (' + elapsed + 's)');
    return;
  }

  const botText = dispatchData.text;
  addMsg('bot', botText, elapsed + 's');

  setPhase('語音合成中…', '');
  try {
    const ttsRes = await fetch(getServer() + '/v1/audio/speech', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input: botText, voice: 'Chelsie', model: 'qwen3-tts' }),
    });
    const ttsBlob = await ttsRes.blob();
    const url = URL.createObjectURL(ttsBlob);
    ttsAudio.src = url;
    setPhase('播放中…', '');
    await ttsAudio.play();
    await new Promise(resolve => { ttsAudio.onended = resolve; });
  } catch (e) {
    console.warn('TTS playback failed:', e);
  }
}

$('serverUrl').addEventListener('change', checkHealth);
checkHealth();
addMsg('system', '語音對話就緒，點擊麥克風開始');
</script>
